{% extends 'car_base.html' %}

{% block title %}
<title>Register | CarHub</title>
{% endblock %}

{% block content %}

<div class="container">
    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 rounded-4 p-4">

                <div class="text-center mb-4">

                    <!-- Logo -->
                    <img src="{{ url_for('static', filename='images/logo.png') }}"
                         alt="CarHub Logo"
                         width="100">

                    <h2 class="mt-3 fw-bold">
                        Create Account
                    </h2>

                    <p class="text-muted">
                        Join CarHub and explore premium cars
                    </p>

                </div>

                <form action="/register" method="post">

                    <div class="mb-3">
                        <label class="form-label">
                            Full Name
                        </label>

                        <input type="name"
                               name="name"
                               class="form-control"
                               placeholder="Enter your full name"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Email Address
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter your email"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Mobile Number
                        </label>

                        <input type="number"
                               name="number"
                               class="form-control"
                               placeholder="Enter mobile number"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Password
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter password"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Confirm Password
                        </label>

                        <input type="password"
                               name="confirm_password"
                               class="form-control"
                               placeholder="Confirm password"
                               required>
                    </div>

                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-primary btn-lg">
                            Register Now
                        </button>
                    </div>

                </form>

                <div class="text-center mt-4">
                    <p>
                        Already have an account?
                        <a href="/login">Login</a>
                    </p>
                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
