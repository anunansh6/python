{% extends 'food_base.html' %}

{% block title %}
<title>Foodie | Register</title>
{% endblock %}

{% block content %}

<div class="register-container">

    <div class="register-card">

        <img src="{{ url_for('static', filename='images/burger.jpg') }}"
             alt="Burger">

        <h1>Create Account</h1>

        <form method="POST">

            <input type="text"
                   name="first_name"
                   placeholder="First Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="text"
                   name="number"
                   placeholder="Mobile Number"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Register
            </button>

        </form>

    </div>

</div>

{% endblock %}
