<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Data</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: #fff;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .field {
            margin: 8px 0;
            color: #555;
        }

        .label {
            font-weight: bold;
            color: #222;
        }
    </style>
</head>

<body>

    <h1>User Details</h1>

    <div class="container">
        {% for x in data %}
        <div class="card">
            <div class="field"><span class="label">Username:</span> {{ x['username'] }}</div>
            <!-- ⚠️ Remove password in real apps -->
            <div class="field"><span class="label">Password:</span> {{ x['password'] }}</div>
            <div class="field"><span class="label">Email:</span> {{ x['mail_id'] }}</div>
            <div class="field"><span class="label">Mobile:</span> {{ x['mobile'] }}</div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
